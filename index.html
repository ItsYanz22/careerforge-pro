<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Performance: Resource Hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://api.google.com">
    <link rel="prefetch" href="/api/analytics">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Performance: Preload critical resources -->
    <link rel="preload" as="script" href="/main.tsx">
    
    <!-- Meta Tags -->
    <title>CareerForge Pro - ATS-Proof Resume Generator</title>
    <meta name="description" content="AI-powered resume builder with ATS optimization, job matching, and AI coaching">
    <meta name="theme-color" content="#10b981">
    
    <!-- Performance: Minimal CSS for faster initial render -->
    <style>
      html { --color-bg: #f9fafb; --color-text: #111827; }
      html.dark { --color-bg: #030712; --color-text: #f9fafb; }
      body { background-color: var(--color-bg); color: var(--color-text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
